name: HF Spaces 同步

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 注入 HF 元数据并同步
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ secrets.HF_REPO }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_REPO" ]; then
            echo "⚠️  HF_TOKEN 或 HF_REPO 未配置，跳过同步"
            exit 0
          fi

          # 注入 HF Spaces 元数据到 README.md 开头
          if ! head -1 README.md | grep -q "^---"; then
            {
              echo "---"
              echo "title: Manticore Bot"
              echo "emoji: 🤖"
              echo "colorFrom: blue"
              echo "colorTo: red"
              echo "sdk: docker"
              echo "pinned: false"
              echo "---"
              echo ""
              cat README.md
            } > README.md.tmp && mv README.md.tmp README.md
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
          fi

          # HF Spaces 要求 Dockerfile 在根目录
          if [ ! -f Dockerfile ] && [ -f docker/Dockerfile ]; then
            cp docker/Dockerfile .
            git add Dockerfile
          fi

          git diff --cached --quiet || git commit -m "ci: 注入 HF Spaces 元数据和 Dockerfile"

          git remote add hf "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_REPO}.git" || true
          git push hf main --force
          echo "✅ 已同步到 HF Spaces: ${HF_REPO}"
